<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Chefs - Chefony</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h1><a href="index.html">Chefony</a></h1>
                <p>Your Private Chef Experience</p>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link" data-en="Home" data-he="בית"></a>
                <a href="chefs.html" class="nav-link active" data-en="Find Chefs" data-he="חפש שפים"></a>
                <a href="index.html#how-it-works" class="nav-link" data-en="How It Works" data-he="איך זה עובד"></a>
                <a href="booking.html" class="nav-link" data-en="Booking" data-he="הזמנה"></a>
                <button class="lang-toggle" onclick="toggleLanguage()">EN/HE</button>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <section class="page-header">
        <h1 data-en="Find Your Perfect Chef" data-he="מצא את השף המושלם שלך">Find Your Perfect Chef</h1>
        <p data-en="Browse our selection of verified professional chefs" data-he="עיין בבחירה של שפים מקצועיים מאומתים">Browse our verified professional chefs</p>
    </section>

    <!-- Filters & Search -->
    <section class="filters-section">
        <div class="filters-container">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search chefs..." data-placeholder-en="Search chefs..." data-placeholder-he="חפש שפים...">
                <button onclick="filterChefs()" class="btn btn-small">🔍</button>
            </div>
            <div class="filter-group">
                <label data-en="Cuisine:" data-he="מטבח:">Cuisine:</label>
                <select id="cuisineFilter" onchange="filterChefs()">
                    <option value="">All Cuisines</option>
                    <option value="italian">Italian</option>
                    <option value="french">French</option>
                    <option value="asian">Asian</option>
                    <option value="mediterranean">Mediterranean</option>
                    <option value="american">American</option>
                </select>
            </div>
            <div class="filter-group">
                <label data-en="Rating:" data-he="דירוג:">Rating:</label>
                <select id="ratingFilter" onchange="filterChefs()">
                    <option value="">All Ratings</option>
                    <option value="5">⭐⭐⭐⭐⭐ (5 stars)</option>
                    <option value="4">⭐⭐⭐⭐ (4+ stars)</option>
                    <option value="3">⭐⭐⭐ (3+ stars)</option>
                </select>
            </div>
            <div class="filter-group">
                <label data-en="Price Range:" data-he="טווח מחירים:">Price Range:</label>
                <select id="priceFilter" onchange="filterChefs()">
                    <option value="">All Prices</option>
                    <option value="budget">$ Budget</option>
                    <option value="moderate">$$ Moderate</option>
                    <option value="premium">$$$ Premium</option>
                    <option value="luxury">$$$$ Luxury</option>
                </select>
            </div>
        </div>
    </section>

    <!-- Chefs Grid -->
    <section class="chefs-section">
        <div class="chefs-grid" id="chefsGrid">
            <!-- Chef cards will be generated here by JavaScript -->
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-section">
                <h4>Chefony</h4>
                <p data-en="Book elite personal chefs for any occasion." data-he="הזמן שפים אליטיים לכל אירוע.">Book elite personal chefs</p>
            </div>
            <div class="footer-section">
                <h4 data-en="Quick Links" data-he="קישורים מהירים">Quick Links</h4>
                <ul>
                    <li><a href="#" data-en="About Us" data-he="אודותינו">About Us</a></li>
                    <li><a href="#" data-en="Contact" data-he="צור קשר">Contact</a></li>
                    <li><a href="#" data-en="Privacy" data-he="פרטיות">Privacy</a></li>
                </ul>
            </div>
            <div class="footer-section">
                <h4 data-en="Follow Us" data-he="עקבו אחרינו">Follow Us</h4>
                <div class="social-links">
                    <a href="#">Facebook</a>
                    <a href="#">Instagram</a>
                    <a href="#">LinkedIn</a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2025 Chefony. <span data-en="All rights reserved." data-he="כל הזכויות שמורות.">All rights reserved.</span></p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        // Initialize chefs on page load
        document.addEventListener('DOMContentLoaded', function() {
            renderChefs(getChefsData());
        });
    </script>
</body>
</html>
